<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>松田観劇カレンダー</title>

</head>
<body>
<header>
  <h1>松田観劇カレンダー</h1>
  <p class="lead">古今東西（都内中心）の気になる公演を集めた個人用の観劇カレンダーです。病的な更新頻度を誇っています。元データ（Googleカレンダー）はこちら→<a href="https://t.co/EUlUPtGV4T" target="_blank" rel="noopener">https://t.co/EUlUPtGV4T</a></p>
  <p class="subtitle"><a class="navlink" href="proposals.html">おすすめ提案</a> ・ <a class="navlink" href="digest.html">傾向ダイジェスト</a></p>
</header>

<nav class="tabs" role="tablist">
  <button class="tab active" data-view="now" role="tab">開催中・今後</button>
  <button class="tab" data-view="archive" role="tab">過去アーカイブ</button>
  <button class="tab" data-view="companies" role="tab">劇団別</button>
</nav>

<div class="toolbar">
  <input id="search" type="search" placeholder="タイトル・劇団・会場で検索" autocomplete="off">
  <div class="datefilter">
    <label class="datelabel">日程で検索</label>
    <input id="date-from" type="date" aria-label="開始日">
    <span class="datesep">〜</span>
    <input id="date-to" type="date" aria-label="終了日">
    <button id="date-clear" hidden>クリア</button>
  </div>
  <div class="months">
    <span class="datelabel" id="months-year"></span>
    <div class="month-btns" id="month-btns"></div>
  </div>
</div>

<main id="app">
  <p class="loading">読み込み中…</p>
</main>

<footer>
  <p id="meta"></p>
  <p class="foot-link"><a href="https://x.com/zooom_zooom_" target="_blank" rel="noopener">@zooom_zooom_ on X</a></p>

</body>
